<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack — Авторизация</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#007aff" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 360px;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
      color: #111827;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .message {
      min-height: 20px;
      margin-bottom: 12px;
      text-align: center;
      font-size: 14px;
    }

    .message.error {
      color: #dc2626;
    }

    .message.success {
      color: #16a34a;
    }

    .form-group {
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #007aff;
      color: white;
      margin-top: 6px;
    }

    .btn-primary:hover {
      background: #0062cc;
    }

    .btn-secondary {
      background: #6b7280;
      color: white;
      margin-top: 10px;
    }

    .btn-secondary:hover {
      background: #4b5563;
    }

    .switch-mode {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: #007aff;
      cursor: pointer;
      user-select: none;
    }

    .switch-mode:hover {
      text-decoration: underline;
    }

    .divider {
      margin: 16px 0 10px;
      text-align: center;
      color: #9ca3af;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="formTitle">Вход</h1>
    <div class="subtitle">FitTrack</div>

    <div id="message" class="message"></div>

    <div class="form-group" id="nameGroup" style="display: none;">
      <input type="text" id="name" placeholder="Имя" />
    </div>

    <div class="form-group">
      <input type="email" id="email" placeholder="Email" />
    </div>

    <div class="form-group">
      <input type="password" id="password" placeholder="Пароль" />
    </div>

    <button id="submitBtn" class="btn-primary" onclick="submitForm()">Войти</button>

    <div class="divider">или</div>

    <button class="btn-secondary" onclick="loginAsGuest()">Войти как гость</button>

    <div class="switch-mode" id="switchMode" onclick="toggleMode()">
      Нет аккаунта? Регистрация
    </div>
  </div>

  <script>
    const API_BASE = 'https://fittrack-app-1-20ly.onrender.com/api/auth';
    let isLogin = true;

    function setMessage(text, type = '') {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message' + (type ? ' ' + type : '');
    }

    function clearMessage() {
      setMessage('');
    }

    function toggleMode() {
      isLogin = !isLogin;

      document.getElementById('formTitle').textContent = isLogin ? 'Вход' : 'Регистрация';
      document.getElementById('submitBtn').textContent = isLogin ? 'Войти' : 'Зарегистрироваться';
      document.getElementById('switchMode').textContent = isLogin
        ? 'Нет аккаунта? Регистрация'
        : 'Уже есть аккаунт? Вход';

      document.getElementById('nameGroup').style.display = isLogin ? 'none' : 'block';
      clearMessage();
    }

    async function submitForm() {
      clearMessage();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password || (!isLogin && !name)) {
        setMessage('Заполните все поля', 'error');
        return;
      }

      const endpoint = isLogin ? '/login' : '/register';
      const payload = isLogin
        ? { email, password }
        : { name, email, password };

      try {
        const response = await fetch(API_BASE + endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        let data = {};
        try {
          data = await response.json();
        } catch (e) {
          data = {};
        }

        if (!response.ok) {
          setMessage(data.error || 'Ошибка запроса', 'error');
          return;
        }

        if (isLogin) {
          localStorage.setItem('fittrack_token', data.token || '');
          localStorage.setItem('fittrack_guest', 'false');
          localStorage.setItem('fittrack_user', JSON.stringify(
            data.user || { name: name || 'Пользователь', email }
          ));

          setMessage('Успешный вход', 'success');

          setTimeout(() => {
            window.location.href = '/index.html';
          }, 700);
        } else {
          setMessage('Регистрация успешна. Теперь войдите.', 'success');
          toggleMode();

          document.getElementById('password').value = '';
        }
      } catch (error) {
        console.error('Auth error:', error);
        setMessage('Сервер недоступен. Попробуйте ещё раз через несколько секунд.', 'error');
      }
    }

    function loginAsGuest() {
      localStorage.removeItem('fittrack_token');
      localStorage.setItem('fittrack_guest', 'true');
      localStorage.setItem('fittrack_user', JSON.stringify({
        name: 'Гость'
      }));

      window.location.href = '/index.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('fittrack_token');
      const guest = localStorage.getItem('fittrack_guest') === 'true';

      if (token || guest) {
        window.location.href = '/index.html';
      }
    });
  </script>
</body>
</html>
