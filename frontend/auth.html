<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Авторизация</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #007aff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #005ecb;
    }

    .switch {
      text-align: center;
      margin-top: 10px;
      cursor: pointer;
      color: #007aff;
    }

    .error {
      color: red;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
    }

    .success {
      color: green;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 id="title">Вход</h2>

  <input id="name" type="text" placeholder="Имя" style="display:none;">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Пароль">

  <button onclick="submitForm()">Войти</button>

  <div class="switch" onclick="toggleMode()">Нет аккаунта? Регистрация</div>

  <div id="message"></div>
</div>

<script>
  const API_BASE = 'https://fittrack-app-1-20ly.onrender.com/api/auth';

  let isLogin = true;

  function toggleMode() {
    isLogin = !isLogin;

    document.getElementById('title').innerText = isLogin ? 'Вход' : 'Регистрация';
    document.querySelector('button').innerText = isLogin ? 'Войти' : 'Зарегистрироваться';
    document.querySelector('.switch').innerText = isLogin
      ? 'Нет аккаунта? Регистрация'
      : 'Уже есть аккаунт? Вход';

    document.getElementById('name').style.display = isLogin ? 'none' : 'block';
    document.getElementById('message').innerHTML = '';
  }

  async function submitForm() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const name = document.getElementById('name').value;
    const message = document.getElementById('message');

    message.innerHTML = '';

    try {
      const url = isLogin ? '/login' : '/register';

      const body = isLogin
        ? { email, password }
        : { name, email, password };

      const res = await fetch(API_BASE + url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (!res.ok) {
        message.innerHTML = `<div class="error">${data.error || 'Ошибка'}</div>`;
        return;
      }

      if (isLogin) {
        localStorage.setItem('token', data.token);
        message.innerHTML = `<div class="success">Успешный вход!</div>`;

        setTimeout(() => {
          window.location.href = '/';
        }, 1000);

      } else {
        message.innerHTML = `<div class="success">Регистрация успешна!</div>`;
        toggleMode();
      }

    } catch (err) {
      console.error(err);
      message.innerHTML = `<div class="error">Сервер недоступен</div>`;
    }
  }
</script>

</body>
</html>
